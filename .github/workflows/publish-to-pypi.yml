name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v3.19.0
  workflow_dispatch:  # Allow manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'
          fetch-depth: 0  # Fetch all history for setuptools-scm
          fetch-tags: true  # Explicitly fetch tags

      - name: Pre-download virtualenv for cibuildwheel (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          curl -L --retry 5 --retry-delay 10 \
            -H "Authorization: token $GITHUB_TOKEN" \
            -o "$CACHE_DIR/virtualenv-20.27.1.pyz" \
            "https://github.com/pypa/get-virtualenv/raw/20.27.1/public/virtualenv.pyz"

      - name: Pre-download virtualenv for cibuildwheel (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $CACHE_DIR = "$env:LOCALAPPDATA\cibuildwheel"
          New-Item -ItemType Directory -Force -Path $CACHE_DIR | Out-Null
          Invoke-WebRequest -Uri "https://github.com/pypa/get-virtualenv/raw/20.27.1/public/virtualenv.pyz" `
            -OutFile "$CACHE_DIR\virtualenv-20.27.1.pyz" -MaximumRetryCount 5

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          output-dir: wheelhouse
        env:
          # Build for Python 3.8, 3.9, 3.10, 3.11, 3.12
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          # Skip 32-bit builds, musllinux, and Windows ARM64
          CIBW_SKIP: "*-win32 *-win_arm64 *-manylinux_i686 *-musllinux_*"
          # Pass CMake arguments for building Python module
          CIBW_ENVIRONMENT: >
            CMAKE_ARGS="-DBUILDPYTHONMODULE=ON -DNOMPI=ON"
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_ARGS="-DBUILDPYTHONMODULE=ON -DNOMPI=ON"

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'
          fetch-depth: 0  # Fetch all history for setuptools-scm
          fetch-tags: true  # Explicitly fetch tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify git tags (debug)
        run: |
          git describe --tags --always
          git tag -l "v*" | tail -5

      - name: Install build dependencies
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_to_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true